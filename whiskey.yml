
Build:
- PowerShell: dir 'env:'
- Log:
    Message: |
        WHISKEY_BUILD_ID                   $(WHISKEY_BUILD_ID)
        WHISKEY_BUILD_NUMBER               $(WHISKEY_BUILD_NUMBER)
        WHISKEY_BUILD_ROOT                 $(WHISKEY_BUILD_ROOT)
        WHISKEY_BUILD_SERVER_NAME          $(WHISKEY_BUILD_SERVER_NAME)
        WHISKEY_BUILD_STARTED_AT           $(WHISKEY_BUILD_STARTED_AT)
        WHISKEY_BUILD_URI                  $(WHISKEY_BUILD_URI)
        WHISKEY_ENVIRONMENT                $(WHISKEY_ENVIRONMENT)
        WHISKEY_JOB_URI                    $(WHISKEY_JOB_URI)
        WHISKEY_MSBUILD_CONFIGURATION      $(WHISKEY_MSBUILD_CONFIGURATION)
        WHISKEY_OUTPUT_DIRECTORY           $(WHISKEY_OUTPUT_DIRECTORY)
        WHISKEY_PIPELINE_NAME              $(WHISKEY_PIPELINE_NAME)
        WHISKEY_SCM_BRANCH                 $(WHISKEY_SCM_BRANCH)
        WHISKEY_SCM_COMMIT_ID              $(WHISKEY_SCM_COMMIT_ID)
        WHISKEY_SCM_URI                    $(WHISKEY_SCM_URI)
        WHISKEY_SEMVER1                    $(WHISKEY_SEMVER1)
        WHISKEY_SEMVER1_VERSION            $(WHISKEY_SEMVER1_VERSION)
        WHISKEY_SEMVER2                    $(WHISKEY_SEMVER2)
        WHISKEY_SEMVER2_NO_BUILD_METADATA  $(WHISKEY_SEMVER2_NO_BUILD_METADATA)
        WHISKEY_SEMVER2_PRERELEASE_ID      $(WHISKEY_SEMVER2_PRERELEASE_ID)
        WHISKEY_SEMVER2_VERSION            $(WHISKEY_SEMVER2_VERSION)
        WHISKEY_TASK_NAME                  $(WHISKEY_TASK_NAME)
        WHISKEY_TASK_TEMP_DIRECTORY        $(WHISKEY_TASK_TEMP_DIRECTORY)
        WHISKEY_TEMP_DIRECTORY             $(WHISKEY_TEMP_DIRECTORY)
        WHISKEY_VERSION                    $(WHISKEY_VERSION)

- Version:
    Path: Whiskey\Whiskey.psd1
    PowerShellModuleName: Whiskey
    Prerelease:
    - main: ""
    - "release/*": ""
    - "*": rc1
    IncrementPrereleaseVersion: true

# Update the AppVeyor build/version number.
- Exec: appveyor UpdateBuild -Version "$(WHISKEY_SEMVER2)+$(WHISKEY_BUILD_NUMBER)"
  .OnlyBy: BuildServer
  .Debug: true
  .Verbose: true

- PowerShell: prism install | Format-Table -Auto

# Dot-sourcing a lot of files when importing a module varys from expensive to really expensive. Merge them into the module manifest.
- MergeFile:
    .OnlyBy: BuildServer
    Path:
    - Whiskey\Functions\*.ps1
    - Whiskey\Tasks\*.ps1
    DestinationPath:
    - Whiskey\Whiskey.psm1
    TextSeparator: "$(NewLine)$(NewLine)"
    DeleteSourceFiles: true

- CopyFile:
    Path:
    - CHANGELOG.md
    - README.md
    DestinationDirectory: Whiskey

# PublishPowerShellModule should come *before* we create the ZIP file so that the ZIP file contains a module manifest
# that has prerelease metadata in it, if needed (which gets added by PublishPowerShellModule).
- PublishPowerShellModule:
    Path: Whiskey

- Exec: appveyor PushArtifact ".output/Whiskey.$(WHISKEY_SEMVER2_NO_BUILD_METADATA).nupkg" -DeploymentName PowerShellGallery
  .OnlyBy: BuildServer

- Zip:
    ArchivePath: .output\Whiskey-$(WHISKEY_SEMVER2).zip
    Path:
    - Whiskey
    Exclude:
    - "*.pdb"
    - "*.orig"

- Exec: appveyor PushArtifact ".output/Whiskey-$(WHISKEY_SEMVER2).zip" -DeploymentName GitHub
  .OnlyBy: BuildServer

- Exec: appveyor PushArtifact 'Whiskey/build.ps1' -DeploymentName GitHub
  .OnlyBy: BuildServer

Tests:
- PowerShell: .\Test-Whiskey.ps1 -RunnerCount $env:WHISKEY_CI_NUM_TEST_RUNNERS
